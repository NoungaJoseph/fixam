$kind: http-request
name: Get Nearby Providers
order: 2000
method: GET
url: '{{baseUrl}}/api/providers/nearby'
queryParams:
  - key: lat
    value: '3.848'
  - key: lng
    value: '11.502'
  - key: radius
    value: '10'
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test("Status is 200", () => pm.response.to.have.status(200));
