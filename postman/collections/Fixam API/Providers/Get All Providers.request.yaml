$kind: http-request
name: Get All Providers
order: 1000
method: GET
url: '{{baseUrl}}/api/providers'
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test("Status is 200", () => pm.response.to.have.status(200));
      const json = pm.response.json();
      pm.test("Response is array or has providers field", () => {
        pm.expect(Array.isArray(json) || json.hasOwnProperty("providers")).to.be.true;
      });
