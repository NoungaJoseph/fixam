$kind: http-request
name: Remove Favorite Provider
order: 6000
method: DELETE
url: '{{baseUrl}}/api/providers/{{providerId}}/favorite'
auth:
  type: bearer
  credentials:
    - key: token
      value: '{{token}}'
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test("Status is 200", () => pm.response.to.have.status(200));
