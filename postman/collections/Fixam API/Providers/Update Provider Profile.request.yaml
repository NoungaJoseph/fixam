$kind: http-request
name: Update Provider Profile
order: 8000
method: PUT
url: '{{baseUrl}}/api/providers/profile'
headers:
  - key: Content-Type
    value: application/json
auth:
  type: bearer
  credentials:
    - key: token
      value: '{{token}}'
body:
  type: json
  content: |-
    {
      "bio": "Experienced plumber",
      "skills": ["plumbing"],
      "hourlyRate": 5000
    }
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test("Status is 200", () => pm.response.to.have.status(200));
