$kind: http-request
name: Top Up Request
order: 2000
method: POST
url: '{{baseUrl}}/api/wallet/topup'
headers:
  - key: Content-Type
    value: application/json
auth:
  type: bearer
  credentials:
    - key: token
      value: '{{token}}'
body:
  type: json
  content: |-
    {
      "amount": 5000,
      "paymentMethod": "MTN_MOMO",
      "phone": "{{phone}}"
    }
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test("Status is 200 or 201", () => {
        pm.expect(pm.response.code).to.be.oneOf([200, 201]);
      });
