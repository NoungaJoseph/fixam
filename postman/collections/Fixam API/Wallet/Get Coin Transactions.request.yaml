$kind: http-request
name: Get Coin Transactions
order: 5000
method: GET
url: '{{baseUrl}}/api/wallet/transactions'
auth:
  type: bearer
  credentials:
    - key: token
      value: '{{token}}'
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test("Status is 200", () => pm.response.to.have.status(200));
      const json = pm.response.json();
      pm.test("Response is array or has transactions field", () => {
        pm.expect(Array.isArray(json) || json.hasOwnProperty("transactions")).to.be.true;
      });
