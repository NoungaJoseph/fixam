$kind: http-request
name: Get Pending Jobs
order: 11000
method: GET
url: '{{baseUrl}}/api/admin/pending-jobs'
auth:
  type: bearer
  credentials:
    - key: token
      value: '{{token}}'
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test("Status is 200", () => pm.response.to.have.status(200));
