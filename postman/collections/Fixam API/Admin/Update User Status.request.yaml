$kind: http-request
name: Update User Status
order: 16000
method: PUT
url: '{{baseUrl}}/api/admin/users/{{userId}}/status'
headers:
  - key: Content-Type
    value: application/json
auth:
  type: bearer
  credentials:
    - key: token
      value: '{{token}}'
body:
  type: json
  content: |-
    {
      "isActive": true
    }
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test("Status is 200", () => pm.response.to.have.status(200));
