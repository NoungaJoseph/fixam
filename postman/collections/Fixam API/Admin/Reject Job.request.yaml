$kind: http-request
name: Reject Job
order: 18000
method: PUT
url: '{{baseUrl}}/api/admin/jobs/{{jobId}}/reject'
headers:
  - key: Content-Type
    value: application/json
auth:
  type: bearer
  credentials:
    - key: token
      value: '{{token}}'
body:
  type: json
  content: |-
    {
      "reason": "Inappropriate content"
    }
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test("Status is 200", () => pm.response.to.have.status(200));
