$kind: http-request
name: Verify Provider
order: 14000
method: POST
url: '{{baseUrl}}/api/admin/verify-provider'
headers:
  - key: Content-Type
    value: application/json
auth:
  type: bearer
  credentials:
    - key: token
      value: '{{token}}'
body:
  type: json
  content: |-
    {
      "providerId": "{{providerId}}",
      "status": "VERIFIED"
    }
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test("Status is 200", () => pm.response.to.have.status(200));
