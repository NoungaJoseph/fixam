$kind: http-request
name: Wire Coins
order: 20000
method: POST
url: '{{baseUrl}}/api/admin/wallet/wire-coins'
headers:
  - key: Content-Type
    value: application/json
auth:
  type: bearer
  credentials:
    - key: token
      value: '{{token}}'
body:
  type: json
  content: |-
    {
      "userId": "{{userId}}",
      "amount": 100,
      "reason": "Bonus"
    }
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test("Status is 200", () => pm.response.to.have.status(200));
