$kind: http-request
name: Initiate Call
order: 1000
method: POST
url: '{{baseUrl}}/api/calls/initiate'
headers:
  - key: Content-Type
    value: application/json
auth:
  type: bearer
  credentials:
    - key: token
      value: '{{token}}'
body:
  type: json
  content: |-
    {
      "receiverId": "{{targetUserId}}",
      "type": "AUDIO"
    }
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test("Status is 200 or 201", () => {
        pm.expect(pm.response.code).to.be.oneOf([200, 201]);
      });
      const json = pm.response.json();
      pm.environment.set("callId", json.id || json.call?.id);
