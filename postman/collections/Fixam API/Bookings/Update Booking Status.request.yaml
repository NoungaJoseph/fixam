$kind: http-request
name: Update Booking Status
order: 3000
method: PATCH
url: '{{baseUrl}}/api/bookings/{{bookingId}}/status'
headers:
  - key: Content-Type
    value: application/json
auth:
  type: bearer
  credentials:
    - key: token
      value: '{{token}}'
body:
  type: json
  content: |-
    {
      "status": "CONFIRMED"
    }
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test("Status is 200", () => pm.response.to.have.status(200));
