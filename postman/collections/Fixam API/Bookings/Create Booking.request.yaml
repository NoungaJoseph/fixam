$kind: http-request
name: Create Booking
order: 1000
method: POST
url: '{{baseUrl}}/api/bookings'
headers:
  - key: Content-Type
    value: application/json
auth:
  type: bearer
  credentials:
    - key: token
      value: '{{token}}'
body:
  type: json
  content: |-
    {
      "providerId": "{{providerId}}",
      "scheduledAt": "2025-12-01T10:00:00Z",
      "description": "Need plumbing service",
      "location": {
        "lat": 3.848,
        "lng": 11.502,
        "address": "Yaoundé"
      }
    }
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test("Status is 201", () => pm.response.to.have.status(201));
      const json = pm.response.json();
      pm.test("Has id", () => pm.expect(json).to.have.property("id"));
      pm.environment.set("bookingId", json.id || json.booking?.id);
