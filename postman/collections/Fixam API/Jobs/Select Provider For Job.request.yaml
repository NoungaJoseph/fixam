$kind: http-request
name: Select Provider For Job
order: 7000
method: POST
url: '{{baseUrl}}/api/jobs/{{jobId}}/applications/{{assignmentId}}/select'
auth:
  type: bearer
  credentials:
    - key: token
      value: '{{token}}'
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test("Status is 200", () => pm.response.to.have.status(200));
