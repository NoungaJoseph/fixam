$kind: http-request
name: 'Get My Jobs (Provider)'
order: 4000
method: GET
url: '{{baseUrl}}/api/jobs/my-jobs'
auth:
  type: bearer
  credentials:
    - key: token
      value: '{{token}}'
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test("Status is 200", () => pm.response.to.have.status(200));
