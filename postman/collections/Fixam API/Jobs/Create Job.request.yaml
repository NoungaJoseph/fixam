$kind: http-request
name: Create Job
order: 1000
method: POST
url: '{{baseUrl}}/api/jobs'
headers:
  - key: Content-Type
    value: application/json
auth:
  type: bearer
  credentials:
    - key: token
      value: '{{token}}'
body:
  type: json
  content: |-
    {
      "title": "Fix kitchen sink",
      "description": "Need a plumber to fix leaking sink",
      "budget": 15000,
      "location": {
        "lat": 3.848,
        "lng": 11.502,
        "address": "Yaoundé, Cameroon"
      },
      "category": "plumbing"
    }
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test("Status is 201", () => pm.response.to.have.status(201));
      const json = pm.response.json();
      pm.test("Has id", () => pm.expect(json).to.have.property("id"));
      pm.environment.set("jobId", json.id || json.job?.id);
