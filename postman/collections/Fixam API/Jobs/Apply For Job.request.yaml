$kind: http-request
name: Apply For Job
order: 6000
method: POST
url: '{{baseUrl}}/api/jobs/{{jobId}}/apply'
headers:
  - key: Content-Type
    value: application/json
auth:
  type: bearer
  credentials:
    - key: token
      value: '{{token}}'
body:
  type: json
  content: |-
    {
      "message": "I can fix this for you",
      "proposedRate": 12000
    }
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test("Status is 200 or 201", () => {
        pm.expect(pm.response.code).to.be.oneOf([200, 201]);
      });
      const json = pm.response.json();
      pm.environment.set("assignmentId", json.id || json.assignment?.id);
