$kind: http-request
name: Get Client Jobs
order: 2000
method: GET
url: '{{baseUrl}}/api/jobs/client'
auth:
  type: bearer
  credentials:
    - key: token
      value: '{{token}}'
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test("Status is 200", () => pm.response.to.have.status(200));
      const json = pm.response.json();
      pm.test("Response is array or has jobs field", () => {
        pm.expect(Array.isArray(json) || json.hasOwnProperty("jobs")).to.be.true;
      });
