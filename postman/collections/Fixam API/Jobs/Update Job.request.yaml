$kind: http-request
name: Update Job
order: 9000
method: PUT
url: '{{baseUrl}}/api/jobs/{{jobId}}'
headers:
  - key: Content-Type
    value: application/json
auth:
  type: bearer
  credentials:
    - key: token
      value: '{{token}}'
body:
  type: json
  content: |-
    {
      "title": "Updated job title"
    }
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test("Status is 200", () => pm.response.to.have.status(200));
