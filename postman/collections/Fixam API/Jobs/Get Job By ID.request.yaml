$kind: http-request
name: Get Job By ID
order: 5000
method: GET
url: '{{baseUrl}}/api/jobs/{{jobId}}'
auth:
  type: bearer
  credentials:
    - key: token
      value: '{{token}}'
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test("Status is 200", () => pm.response.to.have.status(200));
      const json = pm.response.json();
      pm.test("Has id", () => pm.expect(json).to.have.property("id"));
