$kind: http-request
name: Get Payment Status
order: 3000
method: GET
url: '{{baseUrl}}/api/payments/{{paymentId}}/status'
auth:
  type: bearer
  credentials:
    - key: token
      value: '{{token}}'
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test("Status is 200", () => pm.response.to.have.status(200));
