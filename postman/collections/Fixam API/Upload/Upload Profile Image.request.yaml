$kind: http-request
name: Upload Profile Image
order: 1000
method: POST
url: '{{baseUrl}}/api/upload/profile'
auth:
  type: bearer
  credentials:
    - key: token
      value: '{{token}}'
body:
  type: formdata
  content:
    - key: file
      type: file
      src: ''
      description: Profile image file to upload
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test("Status is 200", () => pm.response.to.have.status(200));
      const json = pm.response.json();
      pm.test("Has url field", () => pm.expect(json).to.have.property("url"));
