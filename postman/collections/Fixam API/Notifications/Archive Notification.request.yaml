$kind: http-request
name: Archive Notification
order: 3000
method: PUT
url: '{{baseUrl}}/api/notifications/{{notificationId}}/archive'
auth:
  type: bearer
  credentials:
    - key: token
      value: '{{token}}'
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test("Status is 200", () => pm.response.to.have.status(200));
