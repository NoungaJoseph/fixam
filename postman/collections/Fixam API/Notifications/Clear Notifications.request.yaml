$kind: http-request
name: Clear Notifications
order: 4000
method: DELETE
url: '{{baseUrl}}/api/notifications/clear'
auth:
  type: bearer
  credentials:
    - key: token
      value: '{{token}}'
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test("Status is 200", () => pm.response.to.have.status(200));
