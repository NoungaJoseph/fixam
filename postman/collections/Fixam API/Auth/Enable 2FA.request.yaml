$kind: http-request
name: Enable 2FA
order: 6000
method: POST
url: '{{baseUrl}}/api/auth/2fa/enable'
headers:
  - key: Content-Type
    value: application/json
auth:
  type: bearer
  credentials:
    - key: token
      value: '{{token}}'
body:
  type: json
  content: |-
    {
      "otp": "{{otp}}"
    }
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test("Status is 200", () => pm.response.to.have.status(200));
