$kind: http-request
name: Resend Login OTP
order: 9000
method: POST
url: '{{baseUrl}}/api/auth/2fa/resend-login-otp'
headers:
  - key: Content-Type
    value: application/json
body:
  type: json
  content: |-
    {
      "phone": "{{phone}}"
    }
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test("Status is 200", () => pm.response.to.have.status(200));
