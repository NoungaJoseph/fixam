$kind: http-request
name: Get User Reviews
order: 2000
method: GET
url: '{{baseUrl}}/api/reviews/users/{{userId}}'
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test("Status is 200", () => pm.response.to.have.status(200));
      const json = pm.response.json();
      pm.test("Response is array or has reviews field", () => {
        pm.expect(Array.isArray(json) || json.hasOwnProperty("reviews")).to.be.true;
      });
