$kind: http-request
name: Mark As Read
order: 6000
method: PUT
url: '{{baseUrl}}/api/chat/{{conversationId}}/read'
auth:
  type: bearer
  credentials:
    - key: token
      value: '{{token}}'
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test("Status is 200", () => pm.response.to.have.status(200));
