$kind: http-request
name: Get Active Task For Chat
order: 7000
method: GET
url: '{{baseUrl}}/api/chat/{{conversationId}}/active-task'
auth:
  type: bearer
  credentials:
    - key: token
      value: '{{token}}'
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test("Status is 200", () => pm.response.to.have.status(200));
