$kind: http-request
name: Create Conversation
order: 2000
method: POST
url: '{{baseUrl}}/api/chat/conversations'
headers:
  - key: Content-Type
    value: application/json
auth:
  type: bearer
  credentials:
    - key: token
      value: '{{token}}'
body:
  type: json
  content: |-
    {
      "participantId": "{{targetUserId}}"
    }
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test("Status is 200 or 201", () => {
        pm.expect(pm.response.code).to.be.oneOf([200, 201]);
      });
      const json = pm.response.json();
      pm.environment.set("conversationId", json.id || json.conversation?.id);
