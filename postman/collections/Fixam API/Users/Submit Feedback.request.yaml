$kind: http-request
name: Submit Feedback
order: 4000
method: POST
url: '{{baseUrl}}/api/users/feedback'
headers:
  - key: Content-Type
    value: application/json
auth:
  type: bearer
  credentials:
    - key: token
      value: '{{token}}'
body:
  type: json
  content: |-
    {
      "message": "Great platform!",
      "rating": 5
    }
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test("Status is 201", () => pm.response.to.have.status(201));
