$kind: http-request
name: Update Profile
order: 2000
method: PUT
url: '{{baseUrl}}/api/users/profile'
headers:
  - key: Content-Type
    value: application/json
auth:
  type: bearer
  credentials:
    - key: token
      value: '{{token}}'
body:
  type: json
  content: |-
    {
      "name": "Updated Name",
      "bio": "Test bio"
    }
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test("Status is 200", () => pm.response.to.have.status(200));
