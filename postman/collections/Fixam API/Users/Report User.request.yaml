$kind: http-request
name: Report User
order: 5000
method: POST
url: '{{baseUrl}}/api/users/reports'
headers:
  - key: Content-Type
    value: application/json
auth:
  type: bearer
  credentials:
    - key: token
      value: '{{token}}'
body:
  type: json
  content: |-
    {
      "reportedUserId": "{{targetUserId}}",
      "reason": "Spam"
    }
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test("Status is 201", () => pm.response.to.have.status(201));
