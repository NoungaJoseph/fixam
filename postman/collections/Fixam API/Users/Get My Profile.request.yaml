$kind: http-request
name: Get My Profile
order: 1000
method: GET
url: '{{baseUrl}}/api/users/me'
auth:
  type: bearer
  credentials:
    - key: token
      value: '{{token}}'
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test("Status is 200", () => pm.response.to.have.status(200));
      const json = pm.response.json();
      pm.test("Has id", () => pm.expect(json).to.have.property("id"));
      pm.test("Has phone", () => pm.expect(json).to.have.property("phone"));
      pm.test("Has role", () => pm.expect(json).to.have.property("role"));
      pm.environment.set("userId", json.id);
